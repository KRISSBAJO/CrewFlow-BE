services:
  postgres:
    image: postgres:16-alpine
    container_name: crewflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crewflow
    ports:
      - '5432:5432'
    volumes:
      - crewflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d crewflow']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  crewflow-postgres:
